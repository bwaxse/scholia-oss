services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scholia
      POSTGRES_PASSWORD: scholia
      POSTGRES_DB: scholia
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholia"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://scholia:scholia@db:5432/scholia
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pdf_storage:/app/pdfs

volumes:
  postgres_data:
  pdf_storage:
